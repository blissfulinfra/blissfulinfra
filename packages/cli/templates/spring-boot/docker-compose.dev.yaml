# Dev override — apply on top of docker-compose.yaml:
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
#
# Replaces the production fat-JAR image with Dockerfile.dev, which:
#   - Runs `./gradlew classes -t` for incremental Kotlin compilation
#   - Runs `./gradlew bootRun` with Spring Boot DevTools enabled
#   - Restarts the JVM in ~2-3 s when source files change
#
# Generated by `blissful-infra dev`.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      # Bind-mount source so the in-container compiler sees your edits live
      - ./src:/app/src
      # Persist the Gradle cache across container restarts for fast incremental builds
      - gradle-dev-cache:/root/.gradle
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "false"

volumes:
  gradle-dev-cache:
