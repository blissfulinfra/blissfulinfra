server:
  port: 8080

spring:
  application:
    name: {{PROJECT_NAME}}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
{{#IF_POSTGRES}}

  # Database wiring for the tenant/project/service model (ADR-0017).
  # The service-compose.yaml generator injects:
  #   DB_HOST=postgres, DB_PORT=5432, DB_NAME=app, DB_USER=postgres,
  #   DB_PASSWORD=postgres, DB_SCHEMA=<auto-allocated>,
  #   DB_URL=jdbc:postgresql://postgres:5432/app?currentSchema=<schema>
  #
  # All env vars have localhost fallbacks for running the JAR outside Docker.
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:app}?currentSchema=${DB_SCHEMA:public}}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Pin Hibernate to the per-service schema so every JPA query is
        # automatically scoped (DDD: one bounded context, one schema).
        default_schema: ${DB_SCHEMA:public}

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Flyway creates its history table inside the per-service schema and runs
    # migrations there. Each service therefore versions its own data
    # independently; cross-schema queries are impossible by accident.
    schemas: ${DB_SCHEMA:public}
    default-schema: ${DB_SCHEMA:public}
    # Create the schema if the postgres init script didn't already (true is the
    # Flyway default, made explicit so future-us doesn't get bitten if it flips).
    create-schemas: true
{{/IF_POSTGRES}}
{{#IF_REDIS}}

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false
{{/IF_REDIS}}

{{#IF_KEYCLOAK}}
  security:
    oauth2:
      resourceserver:
        jwt:
          # The compose-time KEYCLOAK_ISSUER_URI env var supplies the in-network
          # URL (http://keycloak:8080/realms/<client-name>) so token validation
          # works. The localhost fallback is only useful when running the JAR
          # outside Docker.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8050/realms/{{KEYCLOAK_REALM}}}
{{/IF_KEYCLOAK}}

{{#IF_LOCALSTACK}}
aws:
  endpoint-url: ${AWS_ENDPOINT_URL:http://localhost:4566}
  public-endpoint-url: ${AWS_PUBLIC_ENDPOINT_URL:${AWS_ENDPOINT_URL:http://localhost:4566}}
  region: ${AWS_DEFAULT_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY_ID:test}
  secret-key: ${AWS_SECRET_ACCESS_KEY:test}
  s3:
    bucket: {{PROJECT_NAME}}-assets
  sqs:
    queue-url: ${AWS_ENDPOINT_URL:http://localhost:4566}/000000000000/{{PROJECT_NAME}}-events
  dynamodb:
    table: {{PROJECT_NAME}}-table

{{/IF_LOCALSTACK}}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      # `application` is resolved at scaffold time to the service name (template
      # var). The other three are runtime env vars injected by the service
      # compose generator so Prometheus can slice by tenant / project / service.
      application: {{PROJECT_NAME}}
      tenant: ${TENANT_NAME:unknown}
      project: ${PROJECT_NAME:unknown}
      service: ${SERVICE_NAME:unknown}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99

logging:
  level:
    root: INFO
    com.blissful: DEBUG
